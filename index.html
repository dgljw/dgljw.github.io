<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>小金鱼 - 记忆管家</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Markdown 渲染库 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- 头部 -->
    <header class="chat-header">
      <h1 id="chat-title" class="chat-title">小金鱼</h1>
      <div class="header-actions">
        <button id="settings-btn" class="header-btn">⚙️</button>
      </div>
    </header>

    <!-- 聊天消息区域 -->
    <div id="chat-messages" class="chat-messages"></div>

    <!-- 输入区域 -->
    <div class="chat-input-area">
      <button id="plus-btn" class="plus-btn">+</button>
      <input type="text" id="message-input" placeholder="说点什么..." autocomplete="off">
      <button id="send-btn" class="send-btn">➤</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- 设置弹窗（手动构建，由 js/settings.js 管理） -->
  <div id="settings-panel" class="modal">
    <div class="modal-content">
      <h3>设置</h3>
      
      <div class="settings-section">
        <label>AI 名字</label>
        <input type="text" id="ai-name-input" value="小金鱼">
      </div>

      <div class="settings-section">
        <label>AI 人设</label>
        <textarea id="ai-persona-input" placeholder="描述 AI 的性格..."></textarea>
      </div>

      <div class="settings-section">
        <label>头像设置</label>
        <div class="avatar-upload-area">
          <span>你的头像：</span>
          <div id="user-avatar-preview" class="avatar-preview">👤</div>
          <input type="file" id="user-avatar-upload" accept="image/*" style="display:none">
          <button onclick="document.getElementById('user-avatar-upload').click()" class="btn-small">上传</button>
        </div>
        <div class="avatar-upload-area" style="margin-top:6px">
          <span>AI 头像：</span>
          <div id="ai-avatar-preview" class="avatar-preview">🐟</div>
          <input type="file" id="ai-avatar-upload" accept="image/*" style="display:none">
          <button onclick="document.getElementById('ai-avatar-upload').click()" class="btn-small">上传</button>
        </div>
      </div>

      <div class="settings-section">
        <label><input type="checkbox" id="enable-search-check"> 🔍 联网搜索</label>
      </div>

      <div class="settings-section">
        <label><input type="checkbox" id="auto-emoji-check"> 😄 自动表情（AI 回复可带贴图）</label>
      </div>

      <div class="settings-section">
        <label>主题</label>
        <select id="theme-select">
          <option value="auto">跟随系统</option>
          <option value="light">浅色</option>
          <option value="dark">深色</option>
        </select>
      </div>

      <div class="settings-section">
        <label>聊天背景</label>
        <select id="bg-select">
          <option value="none">无背景</option>
          <option value="gradient1">海洋渐变</option>
          <option value="gradient2">落日暖阳</option>
          <option value="custom">自定义上传</option>
        </select>
        <div id="bg-preview" style="width:100%;height:40px;border-radius:8px;margin-top:6px;background:var(--bg)"></div>
        <input type="file" id="bg-upload" accept="image/*" style="display:none">
      </div>

      <div class="settings-section">
        <label>数据管理</label>
        <button id="export-memory-btn" class="btn-small">导出记忆</button>
        <button id="import-memory-btn" class="btn-small">导入记忆</button>
        <input type="file" id="import-file-input" accept=".txt" style="display:none">
        <button id="clear-chat-btn" class="btn-small" style="background:#e74c3c;color:white">清空对话</button>
      </div>

      <button id="settings-save" class="btn-primary" style="width:100%;margin-top:8px">保存设置</button>
      <button id="settings-close" class="btn-secondary" style="width:100%;margin-top:4px">取消</button>
    </div>
  </div>

  <!-- 脚本加载（顺序重要） -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/memory.js"></script>
  <script src="js/vision.js"></script>
  <script src="js/emoji-auto.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
