<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>DeepSeek 连续聊天</title>
  <style>
    /* 样式和之前一样，保持不变 */
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 20px auto; padding: 0 15px; }
    #chat-box { border: 1px solid #ddd; border-radius: 8px; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #fafafa; }
    .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 12px; line-height: 1.5; }
    .user { background: #e0f0ff; text-align: right; }
    .assistant { background: #fff; border: 1px solid #eee; }
    textarea { width: 100%; padding: 10px; resize: vertical; border-radius: 8px; border: 1px solid #ccc; }
    button { padding: 10px 20px; border: none; background: #111; color: white; border-radius: 8px; cursor: pointer; margin-top: 5px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h2>🤖 DeepSeek（带记忆版）</h2>
  <div id="chat-box"></div>
  <textarea id="user-input" rows="3" placeholder="输入你的消息，Ctrl+Enter 发送"></textarea><br>
  <button id="send-btn" onclick="sendMessage()">发送</button>
  <button onclick="clearMemory()" style="background:#e53e3e; margin-left:10px;">清空记忆</button>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // ★ 核心：前端维护一个对话历史数组
    let conversationHistory = [];

    userInput.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') sendMessage();
    });

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      // 1. 把用户新说的话加入历史
      conversationHistory.push({ role: 'user', content: text });
      addMessage('user', text);
      userInput.value = '';
      sendBtn.disabled = true;

      try {
        // 2. 把整个 conversationHistory 发给后端
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory })
        });
        const data = await res.json();

        if (data.reply) {
          // 3. 把 AI 的回复也加入历史
          conversationHistory.push({ role: 'assistant', content: data.reply });
          addMessage('assistant', data.reply);
        } else {
          addMessage('assistant', '出错啦：' + (data.error || '未知错误'));
        }
      } catch (err) {
        addMessage('assistant', '网络请求失败：' + err.message);
      }
      sendBtn.disabled = false;
    }

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = content;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function clearMemory() {
      conversationHistory = [];
      chatBox.innerHTML = '';
      addMessage('assistant', '记忆已清空，开始新的对话吧。');
    }
  </script>
</body>
</html>
