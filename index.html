<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DeepSeek 记忆管家</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- 微信引导 -->
  <div id="wechatGuideOverlay" class="wechat-guide-overlay">
    <div class="guide-card">
      <h3>🌐 在浏览器中打开</h3>
      <p>请点击右上角 <b>···</b>，选择 <b>在浏览器中打开</b> 获得完整体验。</p>
      <button class="btn btn-primary" onclick="dismissGuide()">知道了</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- 头部 -->
  <div class="header">
    <input type="text" class="editable-title" id="aiNameInput" value="DeepSeek" placeholder="AI名字" maxlength="15">
    <div class="settings-icon-btn" onclick="openSettings()">⚙️</div>
  </div>

  <!-- 聊天窗口 -->
  <div id="chat-box"></div>

  <!-- 输入区域 -->
  <div class="input-area">
    <textarea id="user-input" rows="1" placeholder="输入消息..."></textarea>
    <button class="btn btn-send" id="send-btn" onclick="sendMessage()">发送</button>
    <button class="btn btn-plus" id="plus-btn" onclick="togglePlusMenu()">+</button>
    <div class="plus-menu" id="plusMenu">
      <div class="plus-menu-item" onclick="handleImageUpload()">🖼️ 图片理解 (即将上线)</div>
    </div>
  </div>

  <!-- 设置面板 -->
  <div class="overlay" id="settingsOverlay">
    <div class="modal">
      <h3>⚙️ 设置</h3>

      <div class="setting-item">
        <label>你的头像 (Emoji 或 上传)</label>
        <div class="avatar-upload-row">
          <div class="avatar-preview" id="userPreviewAvatar">😊</div>
          <input type="text" id="userAvatarInput" placeholder="留空显示'你'" maxlength="4">
          <input type="file" id="userAvatarFile" accept="image/*" style="display:none" onchange="handleAvatarUpload('user', this)">
          <div class="upload-btn" onclick="document.getElementById('userAvatarFile').click()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
        </div>
      </div>

      <div class="setting-item">
        <label>AI 头像 (Emoji 或 上传)</label>
        <div class="avatar-upload-row">
          <div class="avatar-preview" id="aiPreviewAvatar">🤖</div>
          <input type="text" id="aiAvatarInput" placeholder="留空显示首字母" maxlength="4">
          <input type="file" id="aiAvatarFile" accept="image/*" style="display:none" onchange="handleAvatarUpload('ai', this)">
          <div class="upload-btn" onclick="document.getElementById('aiAvatarFile').click()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
        </div>
      </div>

      <div class="setting-item">
        <label>AI 人设 (可选)</label>
        <input type="text" id="personaInput" placeholder="例如：你是一个风趣的助手">
      </div>

      <div class="setting-row">
        <label>🔍 联网搜索</label>
        <label class="toggle-switch">
          <input type="checkbox" id="searchToggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="modal-actions">
        <button class="btn-export" onclick="openExport()">📤 导出</button>
        <button class="btn-import" onclick="document.getElementById('importFileInput').click()">📥 导入</button>
        <input type="file" id="importFileInput" accept=".txt" style="display:none" onchange="importMemory(this)">
        <button class="btn-danger" onclick="clearMemory()">清空</button>
        <button class="btn-primary" onclick="saveSettings()">保存</button>
      </div>
    </div>
  </div>

  <!-- 导出面板 -->
  <div class="overlay" id="exportOverlay">
    <div class="modal">
      <h3>📤 选择导出内容</h3>
      <div><label><input type="checkbox" id="exportAiName" checked onchange="updateExportPreview()"> AI 名字</label></div>
      <div><label><input type="checkbox" id="exportPersona" checked onchange="updateExportPreview()"> 人设</label></div>
      <div><label><input type="checkbox" id="exportMemory" checked onchange="updateExportPreview()"> 长期记忆</label></div>
      <div class="export-preview" id="exportPreview"></div>
      <div class="export-actions">
        <button class="btn-cancel" onclick="closeExport()">取消</button>
        <button class="btn-confirm" onclick="doExport()">确认导出</button>
      </div>
    </div>
  </div>

  <script>
    // ---------- 全局保护 ----------
    window.addEventListener('error', function(e) {
      console.error('全局错误:', e.error);
    });

    // ---------- 微信检测 ----------
    (function() {
      const ua = navigator.userAgent.toLowerCase();
      if (ua.includes('micromessenger') || ua.includes('wechat')) {
        document.getElementById('wechatGuideOverlay').classList.add('active');
        document.getElementById('send-btn').disabled = true;
      }
    })();
    function dismissGuide() {
      document.getElementById('wechatGuideOverlay').classList.remove('active');
      showToast('微信内功能受限，建议在浏览器中打开');
    }

    // ---------- Toast ----------
    const toast = document.getElementById('toast');
    let toastTimer = null;
    function showToast(msg, dur = 2500) {
      if (toastTimer) clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.classList.add('show');
      toastTimer = setTimeout(() => { toast.classList.remove('show'); toastTimer = null; }, dur);
    }

    // ---------- DOM ----------
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const plusBtn = document.getElementById('plus-btn');
    const plusMenu = document.getElementById('plusMenu');
    const aiNameInput = document.getElementById('aiNameInput');
    const settingsOverlay = document.getElementById('settingsOverlay');
    const personaInput = document.getElementById('personaInput');
    const searchToggle = document.getElementById('searchToggle');
    const userAvatarInput = document.getElementById('userAvatarInput');
    const aiAvatarInput = document.getElementById('aiAvatarInput');
    const userPreviewAvatar = document.getElementById('userPreviewAvatar');
    const aiPreviewAvatar = document.getElementById('aiPreviewAvatar');
    const importFileInput = document.getElementById('importFileInput');
    const exportOverlay = document.getElementById('exportOverlay');

    // ---------- 设置管理 ----------
    const STORAGE_KEY = 'ds_chat_memory_v5';
    const SETTINGS_KEY = 'ds_settings_v4';
    const MAX_TOKENS = 10000;

    let settings = {
      aiName: 'DeepSeek',
      persona: '',
      enableSearch: false,
      userAvatar: { emoji: '😊' },
      aiAvatar: {}
    };

    // 加载设置
    try {
      const saved = localStorage.getItem(SETTINGS_KEY);
      if (saved) settings = JSON.parse(saved);
    } catch(e) {}

    function saveSettingsToStorage() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    function applySettingsToUI() {
      aiNameInput.value = settings.aiName;
      personaInput.value = settings.persona;
      searchToggle.checked = settings.enableSearch;
      userAvatarInput.value = settings.userAvatar?.emoji || '';
      aiAvatarInput.value = settings.aiAvatar?.emoji || '';
      updateAvatarPreviews();
    }
    applySettingsToUI();

    function updateAvatarPreviews() {
      renderAvatarPreview('user', userPreviewAvatar);
      renderAvatarPreview('ai', aiPreviewAvatar);
    }

    function getAvatarDisplay(who) {
      const avatarData = who === 'user' ? settings.userAvatar : settings.aiAvatar;
      if (avatarData?.base64) return `<img src="${avatarData.base64}" alt="avatar">`;
      if (avatarData?.emoji) return avatarData.emoji;
      return who === 'user' ? '你' : (settings.aiName || 'AI').charAt(0);
    }

    function renderAvatarPreview(who, previewEl) {
      const display = getAvatarDisplay(who);
      if (display.startsWith('<img')) {
        previewEl.innerHTML = display;
      } else {
        previewEl.innerHTML = '';
        previewEl.textContent = display;
      }
    }

    // 头像上传
    function handleAvatarUpload(who, fileInput) {
      const file = fileInput.files[0];
      if (!file) return;
      if (file.size > 500 * 1024) {
        alert('图片不能超过500KB');
        return;
      }
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.src = e.target.result;
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const size = 128;
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          const minDim = Math.min(img.width, img.height);
          const sx = (img.width - minDim) / 2;
          const sy = (img.height - minDim) / 2;
          ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, size, size);
          const base64 = canvas.toDataURL('image/jpeg', 0.7);
          if (who === 'user') {
            settings.userAvatar = { base64 };
            userAvatarInput.value = '';
          } else {
            settings.aiAvatar = { base64 };
            aiAvatarInput.value = '';
          }
          saveSettingsToStorage();
          updateAvatarPreviews();
          renderAllMessages();
        };
      };
      reader.readAsDataURL(file);
    }

    // 状态
    let systemPersona = settings.persona;
    let aiName = settings.aiName;
    let enableSearch = settings.enableSearch;

    // 对话数据
    let conversationData = {};
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) conversationData = JSON.parse(saved);
    } catch(e) {}
    let conversationHistory = conversationData.history || [];
    let memoryItems = conversationData.memory_items || [];

    function saveConversationData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        history: conversationHistory,
        memory_items: memoryItems
      }));
    }

    // ---------- 事件监听 ----------
    aiNameInput.addEventListener('input', function() {
      settings.aiName = this.value;
      aiName = this.value;
      saveSettingsToStorage();
      updateAvatarPreviews();
      renderAllMessages();
    });

    userInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });
    userInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 加号菜单
    function togglePlusMenu() { plusMenu.classList.toggle('open'); }
    function closePlusMenu() { plusMenu.classList.remove('open'); }
    document.addEventListener('click', function(e) {
      if (!plusBtn.contains(e.target) && !plusMenu.contains(e.target)) closePlusMenu();
    });
    function handleImageUpload() {
      closePlusMenu();
      showToast('🖼️ 图片理解功能即将上线');
    }

    // 设置面板
    function openSettings() { settingsOverlay.classList.add('open'); }
    function closeSettings() { settingsOverlay.classList.remove('open'); }
    settingsOverlay.addEventListener('click', function(e) {
      if (e.target === settingsOverlay) closeSettings();
    });

    function saveSettings() {
      settings.persona = personaInput.value.trim();
      systemPersona = settings.persona;
      settings.enableSearch = searchToggle.checked;
      enableSearch = settings.enableSearch;
      const userEmoji = userAvatarInput.value.trim();
      settings.userAvatar = userEmoji ? { emoji: userEmoji } : {};
      const aiEmoji = aiAvatarInput.value.trim();
      settings.aiAvatar = aiEmoji ? { emoji: aiEmoji } : {};
      saveSettingsToStorage();
      closeSettings();
      updateAvatarPreviews();
      renderAllMessages();
    }

    function clearMemory() {
      if (confirm('确定要清空所有记忆吗？此操作不可恢复。')) {
        conversationHistory = [];
        memoryItems = [];
        saveConversationData();
        chatBox.innerHTML = '';
        addMessage('assistant', '所有记忆已清空。');
        closeSettings();
      }
    }

    // ---------- 导出 ----------
    function openExport() {
      updateExportPreview();
      exportOverlay.classList.add('open');
    }
    function closeExport() {
      exportOverlay.classList.remove('open');
    }
    function updateExportPreview() {
      const incName = document.getElementById('exportAiName').checked;
      const incPersona = document.getElementById('exportPersona').checked;
      const incMemory = document.getElementById('exportMemory').checked;
      let text = '';
      if (incName) text += `=== AI 名字 ===\n${settings.aiName}\n\n`;
      if (incPersona) text += `=== 人设 ===\n${settings.persona || '(无)'}\n\n`;
      if (incMemory) {
        text += `=== 长期记忆 ===\n`;
        text += memoryItems.length ? memoryItems.map(i => `- ${i}`).join('\n') : '(无)';
      }
      document.getElementById('exportPreview').textContent = text.trim() || '(未选择任何内容)';
    }
    function doExport() {
      const text = document.getElementById('exportPreview').textContent;
      if (!text || text === '(未选择任何内容)') {
        showToast('请至少勾选一项');
        return;
      }
      const blob = new Blob(['\uFEFF' + text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `记忆备份_${new Date().toISOString().slice(0,10)}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      closeExport();
      showToast('📤 已导出');
    }

    // ---------- 导入 ----------
    function importMemory(fileInput) {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const content = e.target.result;
        try {
          const parsed = parseMemoryTxt(content);
          if (confirm(`即将导入：\nAI名字：${parsed.aiName}\n人设：${parsed.persona}\n长期记忆：${parsed.memoryItems.length}条\n\n（对话历史将被清空）`)) {
            settings.aiName = parsed.aiName;
            aiName = parsed.aiName;
            settings.persona = parsed.persona;
            systemPersona = parsed.persona;
            saveSettingsToStorage();
            memoryItems = parsed.memoryItems;
            conversationHistory = [];
            saveConversationData();
            applySettingsToUI();
            chatBox.innerHTML = '';
            addMessage('assistant', '📥 记忆已导入，长期记忆已恢复。');
            showToast('导入成功');
            closeSettings();
          }
        } catch(e) {
          showToast('导入失败：' + e.message);
        }
      };
      reader.onerror = function() {
        showToast('文件读取失败');
      };
      reader.readAsText(file, 'UTF-8');
      fileInput.value = '';
    }

    function parseMemoryTxt(text) {
      const lines = text.split('\n');
      const result = { aiName: 'DeepSeek', persona: '', memoryItems: [] };
      let section = '';
      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed === '=== AI 名字 ===') { section = 'ainame'; continue; }
        if (trimmed === '=== 人设 ===') { section = 'persona'; continue; }
        if (trimmed === '=== 长期记忆 ===') { section = 'memory'; continue; }
        if (!trimmed) continue;
        switch (section) {
          case 'ainame': result.aiName = trimmed; break;
          case 'persona': result.persona = trimmed === '(无)' ? '' : trimmed; break;
          case 'memory':
            if (trimmed === '(无)') break;
            result.memoryItems.push(trimmed.startsWith('- ') ? trimmed.substring(2) : trimmed);
            break;
        }
      }
      return result;
    }

    // ---------- 记忆压缩 ----------
    function estimateTokens(text) {
      const chinese = (text.match(/[\u4e00-\u9fff]/g) || []).length;
      return Math.ceil(chinese / 1.5 + (text.length - chinese) / 2);
    }
    function getTotalTokens() {
      return conversationHistory.reduce((acc, m) => acc + estimateTokens(m.content), 0);
    }
    async function smartCompressHistory() {
      if (getTotalTokens() <= MAX_TOKENS) return;
      const backgroundTask = async () => {
        try {
          const res = await fetch('/api/summarize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: [...conversationHistory],
              existingMemory: memoryItems
            })
          });
          if (!res.ok) return;
          const data = await res.json();
          const newItems = data.memory_items || [];
          const summary = data.summary || '';
          memoryItems = [...new Set([...memoryItems, ...newItems])];
          const recent = conversationHistory.slice(-50);
          const newHistory = [];
          if (systemPersona) newHistory.push({ role: 'system', content: systemPersona });
          if (memoryItems.length) newHistory.push({ role: 'system', content: `[长期记忆]\n${memoryItems.join('\n')}` });
          if (summary) newHistory.push({ role: 'system', content: `[对话摘要]\n${summary}` });
          newHistory.push(...recent);
          conversationHistory = newHistory;
          saveConversationData();
          showToast('🧠 记忆已自动整合');
        } catch(e) {}
      };
      backgroundTask();
    }

    // ---------- 发送消息 ----------
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      closePlusMenu();

      smartCompressHistory();

      conversationHistory.push({ role: 'user', content: text });
      saveConversationData();
      addMessage('user', text);
      userInput.value = '';
      userInput.style.height = 'auto';
      sendBtn.disabled = true;

      const loadingRow = createTypingIndicator();
      chatBox.appendChild(loadingRow);
      chatBox.scrollTop = chatBox.scrollHeight;

      const apiMessages = [];
      if (systemPersona) apiMessages.push({ role: 'system', content: systemPersona });
      if (memoryItems.length) apiMessages.push({ role: 'system', content: `[长期记忆]\n${memoryItems.join('\n')}` });
      apiMessages.push(...conversationHistory);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: apiMessages,
            enable_search: enableSearch
          })
        });
        loadingRow.remove();
        if (!res.ok) {
          addMessage('assistant', `请求失败 (${res.status})：请稍后重试`);
          sendBtn.disabled = false;
          return;
        }
        const data = await res.json();
        if (data.reply) {
          addMessage('assistant', data.reply);
          conversationHistory.push({ role: 'assistant', content: data.reply });
          saveConversationData();
        } else {
          addMessage('assistant', '出错啦：' + (data.error || '服务器返回了空内容'));
        }
      } catch(err) {
        loadingRow.remove();
        addMessage('assistant', '网络请求失败，请切换到系统浏览器再试一次。');
      } finally {
        sendBtn.disabled = false;
      }
    }

    // ---------- 渲染函数 ----------
    function createTypingIndicator() {
      const row = document.createElement('div');
      row.className = 'typing-indicator-row';
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.innerHTML = getAvatarDisplay('ai');
      const bubble = document.createElement('div');
      bubble.className = 'typing-bubble';
      bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      row.appendChild(avatar);
      row.appendChild(bubble);
      return row;
    }

    function createMessageRow(role, content) {
      const row = document.createElement('div');
      row.className = `message-row ${role}`;
      row.classList.add(role === 'user' ? 'row-user' : 'row-assistant');

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.innerHTML = getAvatarDisplay(role === 'user' ? 'user' : 'ai');

      const bubble = document.createElement('div');
      bubble.className = 'msg';
      if (role === 'assistant') {
        try {
          bubble.innerHTML = marked.parse(content);
        } catch(e) {
          bubble.textContent = content;
        }
        // 包裹表格
        bubble.querySelectorAll('table').forEach(table => {
          if (table.parentNode.classList.contains('table-wrapper')) return;
          const wrapper = document.createElement('div');
          wrapper.className = 'table-wrapper';
          table.parentNode.insertBefore(wrapper, table);
          wrapper.appendChild(table);
        });
      } else {
        bubble.textContent = content;
      }

      row.appendChild(avatar);
      row.appendChild(bubble);
      return row;
    }

    function addMessage(role, content) {
      const row = createMessageRow(role, content);
      row.classList.add('animate__animated', role === 'user' ? 'animate__fadeInRight' : 'animate__fadeInLeft');
      row.style.setProperty('--animate-duration', '0.3s');
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function renderAllMessages() {
      chatBox.innerHTML = '';
      conversationHistory.forEach(msg => {
        if (msg.role === 'user' || msg.role === 'assistant') {
          addMessage(msg.role, msg.content);
        }
      });
    }

    // 初始渲染
    renderAllMessages();
  </script>
</body>
</html>
