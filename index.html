<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek 聊天 · 思考折叠版</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 20px auto; padding: 0 15px; background: #fff; }
    #chat-box { 
      border: 1px solid #ddd; border-radius: 8px; height: 400px; overflow-y: auto; 
      padding: 10px; margin-bottom: 10px; background: #fafafa; 
    }
    .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
    .user { background: #e0f0ff; text-align: right; }
    .assistant { background: #fff; border: 1px solid #eee; }

    /* 思考过程折叠区域 */
    .thinking-toggle {
      cursor: pointer;
      color: #b77d1a;
      font-size: 0.9em;
      font-weight: 500;
      margin-bottom: 4px;
      user-select: none;
    }
    .thinking-toggle::before {
      content: '▶ ';
      display: inline-block;
      transition: transform 0.15s;
      font-size: 0.8em;
      margin-right: 2px;
    }
    .thinking-toggle.open::before {
      transform: rotate(90deg);
    }
    .thinking-content {
      background: #fff9e6;
      border: 1px dashed #f0c36d;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 6px;
      color: #5a4a2f;
      font-style: italic;
      display: none;
      white-space: pre-wrap;
    }
    .thinking-content.open {
      display: block;
    }

    textarea { width: 100%; padding: 10px; resize: vertical; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    button { padding: 10px 20px; border: none; background: #111; color: white; border-radius: 8px; cursor: pointer; margin-top: 5px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-clear { background: #e53e3e; margin-left: 10px; }
  </style>
</head>
<body>
  <h2>🤖 DeepSeek V4 Pro（思考折叠）</h2>
  <div id="chat-box"></div>
  <textarea id="user-input" rows="3" placeholder="输入你的消息，Ctrl+Enter 发送..."></textarea><br>
  <button id="send-btn" onclick="sendMessage()">发送</button>
  <button class="btn-clear" onclick="clearMemory()">清空记忆</button>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const STORAGE_KEY = 'deepseek_chat_history';

    function saveHistory() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory));
      } catch (e) { console.error('保存历史记录失败', e); }
    }

    function loadHistory() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : [];
      } catch (e) { console.error('加载历史记录失败', e); return []; }
    }

    let conversationHistory = loadHistory();

    // 页面加载时渲染历史
    if (conversationHistory.length > 0) {
      conversationHistory.forEach(msg => {
        if (msg.role === 'user') {
          addMessage('user', msg.content);
        } else if (msg.role === 'assistant') {
          addAssistantMessage(msg.content, msg.reasoning_content);
        }
      });
    }

    function clearMemory() {
      conversationHistory = [];
      localStorage.removeItem(STORAGE_KEY);
      chatBox.innerHTML = '';
      addMessage('assistant', '记忆已清空，开始新的对话吧。');
    }

    userInput.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') sendMessage();
    });

    // 发送消息（非流式）
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      // 添加用户消息
      conversationHistory.push({ role: 'user', content: text });
      saveHistory();
      addMessage('user', text);
      userInput.value = '';
      sendBtn.disabled = true;

      // 创建“思考中...”占位容器
      const container = document.createElement('div');
      container.className = 'msg assistant';
      container.innerHTML = '<span style="color:#888;">💭 思考中...</span>';
      chatBox.appendChild(container);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory })
        });

        if (!res.ok) {
          container.innerHTML = `<span style="color:red;">请求失败: HTTP ${res.status}</span>`;
          sendBtn.disabled = false;
          return;
        }

        const data = await res.json();

        if (data.reply) {
          // 移除思考中占位
          container.remove();

          // 添加带折叠思考的助手消息
          addAssistantMessage(data.reply, data.reasoning_content);

          // 保存到历史
          const assistantMsg = {
            role: 'assistant',
            content: data.reply,
            reasoning_content: data.reasoning_content || undefined
          };
          conversationHistory.push(assistantMsg);
          saveHistory();
        } else {
          container.innerHTML = `<span style="color:red;">出错啦：${data.error || '未知错误'}</span>`;
        }
      } catch (err) {
        container.innerHTML = `<span style="color:red;">网络请求失败：${err.message}</span>`;
      } finally {
        sendBtn.disabled = false;
      }
    }

    // 添加一条助手消息，支持折叠思考过程
    function addAssistantMessage(content, reasoning) {
      const wrapper = document.createElement('div');
      wrapper.className = 'msg assistant';

      // 如果有思考内容，先添加可折叠区域
      if (reasoning) {
        const toggle = document.createElement('div');
        toggle.className = 'thinking-toggle';
        toggle.textContent = '思考过程';
        toggle.addEventListener('click', function() {
          const thinkDiv = this.nextElementSibling;
          if (thinkDiv) {
            thinkDiv.classList.toggle('open');
            this.classList.toggle('open');
          }
        });

        const thinkContent = document.createElement('div');
        thinkContent.className = 'thinking-content';
        thinkContent.textContent = reasoning;

        wrapper.appendChild(toggle);
        wrapper.appendChild(thinkContent);
      }

      // 添加回答内容
      const replyDiv = document.createElement('div');
      replyDiv.textContent = content || '（没有返回回答内容）';
      wrapper.appendChild(replyDiv);

      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 普通消息（用户消息或纯文本）
    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = content;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
