<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>DeepSeek 连续聊天</title>
  <style>
    /* 样式和之前一样，保持不变 */
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 20px auto; padding: 0 15px; }
    #chat-box { border: 1px solid #ddd; border-radius: 8px; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #fafafa; }
    .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 12px; line-height: 1.5; }
    .user { background: #e0f0ff; text-align: right; }
    .assistant { background: #fff; border: 1px solid #eee; }
    textarea { width: 100%; padding: 10px; resize: vertical; border-radius: 8px; border: 1px solid #ccc; }
    button { padding: 10px 20px; border: none; background: #111; color: white; border-radius: 8px; cursor: pointer; margin-top: 5px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h2>🤖 DeepSeek（带记忆版）</h2>
  <div id="chat-box"></div>
  <textarea id="user-input" rows="3" placeholder="输入你的消息，Ctrl+Enter 发送"></textarea><br>
  <button id="send-btn" onclick="sendMessage()">发送</button>
  <button onclick="clearMemory()" style="background:#e53e3e; margin-left:10px;">清空记忆</button>
<script>
  const chatBox = document.getElementById('chat-box');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const STORAGE_KEY = 'deepseek_chat_history';

  let conversationHistory = loadHistory();
  if (conversationHistory.length > 0) {
    conversationHistory.forEach(msg => addMessage(msg.role, msg.content));
  }

  function saveHistory() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(conversationHistory));
    } catch (e) { console.error('保存历史记录失败', e); }
  }

  function loadHistory() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : [];
    } catch (e) {
      console.error('加载历史记录失败', e);
      return [];
    }
  }

  function clearMemory() {
    conversationHistory = [];
    localStorage.removeItem(STORAGE_KEY);
    chatBox.innerHTML = '';
    addMessage('assistant', '记忆已清空，开始新的对话吧。');
  }

  userInput.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'Enter') sendMessage();
  });

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    // 1. 用户消息入列、保存、显示
    conversationHistory.push({ role: 'user', content: text });
    saveHistory();
    addMessage('user', text);
    userInput.value = '';
    sendBtn.disabled = true;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });
      const data = await res.json();

      if (data.reply) {
        // 2. ★ 助手回复与思考过程入列
        const assistantMessage = {
          role: 'assistant',
          content: data.reply, // 最终回答
          reasoning_content: data.reasoning_content // 保存思维链，但不影响下次请求
        };
        conversationHistory.push(assistantMessage);
        saveHistory();

        // 3. ★ 在界面上显示思考过程
        if (data.reasoning_content) {
          addMessage('assistant', '💭 思考中...\n' + data.reasoning_content);
        }
        // 接着显示最终的回复
        addMessage('assistant', data.reply);

      } else {
        addMessage('assistant', '出错啦：' + (data.error || '未知错误'));
      }
    } catch (err) {
      addMessage('assistant', '网络请求失败：' + err.message);
    }
    sendBtn.disabled = false;
  }

  function addMessage(role, content) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = content;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>
